name: langgraph-redbank-orchestrator
displayName: "RedBank Orchestrator Agent"
framework: langgraph
description: "Multi-agent orchestrator that classifies user intent and routes queries to specialist agents (Knowledge, Banking Ops) via A2A protocol."
env:
  required:
    - API_KEY
    - BASE_URL
    - MODEL_ID
  optional:
    - PORT
    - CONTAINER_IMAGE
    - AGENT_URLS
    - KNOWLEDGE_AGENT_URL
    - BANKING_AGENT_URL
